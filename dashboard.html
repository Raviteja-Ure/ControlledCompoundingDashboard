<!DOCTYPE html>
<html>
<head>
    <title>Controlled Compounding Engine Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            margin-top: 30px;
        }
        .card {
            background-color: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }
        canvas {
            background-color: #111827;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>

<h1>Controlled Compounding Engine</h1>

<div class="card">
    <h3>Strategy vs Nifty Benchmark</h3>
    <canvas id="equityChart"></canvas>
</div>

<div class="card">
    <h3>Rolling Drawdown (%)</h3>
    <canvas id="drawdownChart"></canvas>
</div>

<script>
fetch('paper_trade_log.csv')
.then(response => response.text())
.then(csv => {
    const rows = csv.split("\n").slice(1);
    
    const dates = [];
    const equity = [];
    const nifty = [];
    const drawdown = [];
    
    let maxEquity = 0;

    rows.forEach(row => {
        const cols = row.split(",");
        if (cols.length < 6) return;

        const date = cols[0];
        const value = parseFloat(cols[4]);
        const niftyClose = parseFloat(cols[5]);

        dates.push(date);
        equity.push(value);

        if (equity.length === 1) {
            nifty.push(100000);
        } else {
            const prev = nifty[nifty.length - 1];
            const prevClose = parseFloat(rows[equity.length - 2].split(",")[5]);
            nifty.push(prev * (niftyClose / prevClose));
        }

        maxEquity = Math.max(maxEquity, value);
        drawdown.push(((value / maxEquity) - 1) * 100);
    });

    new Chart(document.getElementById('equityChart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Strategy Equity',
                    data: equity,
                    borderColor: '#22c55e',
                    tension: 0.1
                },
                {
                    label: 'Nifty Benchmark',
                    data: nifty,
                    borderColor: '#3b82f6',
                    tension: 0.1
                }
            ]
        }
    });

    new Chart(document.getElementById('drawdownChart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Drawdown %',
                    data: drawdown,
                    borderColor: '#ef4444',
                    tension: 0.1
                }
            ]
        }
    });
});
</script>

</body>
</html>
